services:
  frontend:
    build:
      context: ./frontend
    container_name: project012-frontend
    ports:
      - "${FRONTEND_PORT:-8090}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: project012-backend
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-3000}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-project012}
      DB_USER: ${POSTGRES_USER:-project012}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-this-password}
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: project012-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-project012}
      POSTGRES_USER: ${POSTGRES_USER:-project012}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-project012} -d ${POSTGRES_DB:-project012}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
